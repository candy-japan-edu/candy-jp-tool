<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>学校对比 - Candy 日本大学校内考</title>
    <meta name="description" content="对比日本大学校内考的档位、出愿截止、校内考日期、EJU 科目、英语要求和 Candy 推荐。" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="compare">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Candy 日本校内考查询库">
        <img class="brand-avatar" src="./assets/candy-avatar.jpg" alt="Candy 日本留学圈头像" />
        <span>
          <strong>CANDY 日本留学圈</strong>
          <small>学校对比</small>
        </span>
      </a>
      <a class="header-link" href="./index.html">返回查询</a>
    </header>

    <main class="page-shell compare-shell">
      <section class="compare-head">
        <div>
          <p class="eyebrow">Compare</p>
          <h1 id="compareTitle">学校对比 (0/3)</h1>
        </div>
        <a class="secondary-button" id="addSchoolLink" href="./index.html">+ 添加学校</a>
      </section>

      <section id="compareView" class="compare-view" aria-live="polite"></section>
    </main>

    <button class="floating-cta" type="button" data-open-wechat>让 Candy 帮你选</button>

    <div class="modal-backdrop" id="wechatModal" aria-hidden="true">
      <section class="wechat-modal" role="dialog" aria-modal="true" aria-labelledby="wechatTitle">
        <button class="modal-close" type="button" data-close-wechat aria-label="关闭">×</button>
        <h2 id="wechatTitle">Candy 老师 1v1 咨询</h2>
        <img src="./assets/candy-qrcode.png" alt="Candy 老师微信二维码" loading="lazy" />
        <p>长按识别 / 截图保存</p>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
