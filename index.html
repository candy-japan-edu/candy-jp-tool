<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Candy 日本大学校内考查询库</title>
    <meta
      name="description"
      content="Candy 日本校内考查询库：查询目标日本大学的出愿截止、校内考日期、考试形式和出愿要求。"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Candy 日本校内考查询库">
        <img class="brand-avatar" src="./assets/candy-avatar.jpg" alt="Candy 日本留学圈头像" />
        <span>
          <strong>CANDY 日本留学圈</strong>
          <small>校内考查询库</small>
        </span>
      </a>
      <a class="header-link" href="./compare.html">对比清单 <span id="compareBadge">0</span></a>
    </header>

    <main class="page-shell">
      <section class="hero-section">
        <div class="hero-copy">
          <p class="eyebrow">Candy 校内考 Calendar</p>
          <h1>30秒查到你目标大学的校内考时间·考试形式·出愿要求</h1>
          <p>第一批先覆盖第一档目标校，后续从腾讯文档持续补充到完整数据库。</p>
        </div>
      </section>

      <section class="notice-strip">
        <strong>数据状态</strong>
        <span>当前日期为样例库；已接入官方募集要项入口，详情页可查看官方原文。</span>
      </section>

      <section class="content-head calendar-head">
        <div>
          <p class="eyebrow">Exam Calendar</p>
          <h2 id="calendarTitle">考试时间日历</h2>
        </div>
        <div class="calendar-nav" aria-label="日历月份切换">
          <button class="text-button" type="button" id="prevMonth">‹</button>
          <button class="text-button" type="button" id="todayMonth">最近</button>
          <button class="text-button" type="button" id="nextMonth">›</button>
        </div>
      </section>

      <section id="calendarView" class="calendar-view" aria-live="polite"></section>

      <section class="search-panel" aria-label="校内考查询">
        <label class="search-box" for="searchInput">
          <span>学校名 / 日文名 / 学部 / 专业 / 标签</span>
          <input id="searchInput" type="search" placeholder="例如：东京大学 / 経済 / 机械 / 医学 / 关西" autocomplete="off" />
        </label>

        <div class="filter-group" aria-label="档位筛选">
          <p>档位</p>
          <div class="chip-row" id="tierChips"></div>
        </div>
        <div class="filter-group" aria-label="类型筛选">
          <p>类型</p>
          <div class="chip-row" id="typeChips"></div>
        </div>
        <div class="filter-group" aria-label="方向筛选">
          <p>方向</p>
          <div class="chip-row" id="directionChips"></div>
        </div>
        <div class="filter-group" aria-label="地区筛选">
          <p>地区</p>
          <div class="chip-row" id="regionChips"></div>
        </div>

        <div class="view-toolbar">
          <div class="active-filter-line" id="activeFilters">全部学校</div>
          <div class="segmented" aria-label="视图切换">
            <button class="active" id="timelineButton" type="button" data-view="timeline">📅 时间轴</button>
            <button id="listButton" type="button" data-view="list">📋 列表</button>
          </div>
        </div>
      </section>

      <section class="stats-grid" aria-label="数据库概览">
        <article>
          <span id="schoolCount">0</span>
          <p>所学校</p>
        </article>
        <article>
          <span id="majorCount">0</span>
          <p>条专业数据</p>
        </article>
        <article>
          <span id="eventCount">0</span>
          <p>个关键节点</p>
        </article>
      </section>

      <section class="content-head">
        <div>
          <p class="eyebrow">Calendar</p>
          <h2 id="resultTitle">校内考时间轴</h2>
        </div>
        <button class="text-button" id="resetFilters" type="button">重置</button>
      </section>

      <section id="timelineView" class="timeline-view" aria-live="polite"></section>
      <section id="listView" class="list-view hidden" aria-live="polite"></section>
    </main>

    <button class="floating-cta" type="button" data-open-wechat>加 Candy 老师微信咨询</button>

    <div class="modal-backdrop" id="wechatModal" aria-hidden="true">
      <section class="wechat-modal" role="dialog" aria-modal="true" aria-labelledby="wechatTitle">
        <button class="modal-close" type="button" data-close-wechat aria-label="关闭">×</button>
        <h2 id="wechatTitle">Candy 老师 1v1 咨询</h2>
        <img src="./assets/candy-qrcode.png" alt="Candy 老师微信二维码" loading="lazy" />
        <p>长按识别 / 截图保存</p>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
